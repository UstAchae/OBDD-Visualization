<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BDD Visualizer UI (Desmos-like)</title>

    <!-- Cytoscape (CDN) -->
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>

    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
<div class="app">
    <div class="main">
        <section class="left">
            <div class="left-header">
                <div class="title">Expressions</div>
                <div class="left-actions">
                    <button class="btn" id="btnAdd" type="button">+ Add</button>
                    <button class="btn danger" id="btnClearAll" type="button">Clear</button>
                </div>
            </div>

            <div class="expr-list" id="exprList"></div>

            <!-- Keyboard is now left-only -->
            <section class="keyboard kbd-panel" id="keyboard">
                <div class="kbd-header">
                    <button id="btnKbdToggle" class="kbd-toggle" type="button" aria-expanded="true" title="Toggle keyboard">
                        ⌨︎
                    </button>
                    <div class="kbd-grip"></div>
                </div>

                <div class="kbd-body">
                    <div class="kbd-area">
                        <div class="kbd-row" id="rowAP">
                            <div class="key" data-insert="p">p</div>
                            <div class="key" data-insert="q">q</div>
                            <div class="key" data-insert="r">r</div>
                            <div class="key" data-insert="s">s</div>
                            <div class="key fn" data-action="addAP">+AP</div>
                        </div>

                        <div class="kbd-row">
                            <div class="key op" data-insert="¬">¬</div>
                            <div class="key op" data-insert="∧">∧</div>
                            <div class="key op" data-insert="∨">∨</div>
                            <div class="key op" data-insert="⊕">⊕</div>
                            <div class="key op" data-insert="→">→</div>
                            <div class="key op" data-insert="↔">↔</div>
                        </div>

                        <div class="kbd-row">
                            <div class="key" data-insert="(">(</div>
                            <div class="key" data-insert=")">)</div>
                            <div class="key" data-insert="1">1</div>
                            <div class="key" data-insert="0">0</div>
                            <div class="key fn" data-action="space">Space</div>
                            <div class="key fn" data-action="backspace">⌫</div>
                        </div>

                        <div class="kbd-row">
                            <div class="key fn" data-action="newLine">New line</div>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <section class="right">
            <div class="right-header">
                <div class="title">BDD View</div>
                <div class="status">
                    <span class="pill" id="selectedInfo">No selection</span>
                    <span class="pill" id="backendInfo">Backend: /api/bdd</span>
                </div>
            </div>

            <div class="cy-wrap">
                <div class="layer-axis" id="layerAxis"></div>
                <div id="cy"></div>
            </div>

            <!-- New bottom bar for Reduce -->
            <div class="bdd-bar" id="bddBar">
                <button class="btn primary" id="btnReduce" type="button">Reduce</button>
                <button class="btn" id="btnReduceTerminals" type="button">Reduce: terminals</button>
                <button class="btn" id="btnReduceRedundant" type="button">Reduce: redundant test</button>
                <button class="btn primary" id="btnReduceMerge" type="button">Reduce: merge nodes</button>

                <div class="bdd-bar-spacer"></div>

                <button class="btn" id="btnFit" type="button">Fit</button>
                <button class="btn" id="btnResetExample" type="button">Example</button>
            </div>
        </section>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
